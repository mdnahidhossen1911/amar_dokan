definitions:
  models.CreateUserRequest:
    properties:
      email:
        type: string
      is_owner:
        type: boolean
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  utils.ApiResponse:
    properties:
      data: {}
      message:
        type: string
      meta: {}
      success:
        type: boolean
    type: object
host: localhost:8000
info:
  contact: {}
  description: This is a sample server for Gin API.
  title: Amar Dokan API
  version: "1.0"
paths:
  /api/v1/users:
    post:
      consumes:
      - application/json
      description: create user
      parameters:
      - description: User Data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Account created. OTP has been sent to your email.
          schema:
            $ref: '#/definitions/utils.ApiResponse'
      summary: Create new user
      tags:
      - Users
  /api/v1/users/login:
    post:
      consumes:
      - application/json
      description: authenticate user and get token
      parameters:
      - description: Login Credentials
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login Successful
          schema:
            $ref: '#/definitions/utils.ApiResponse'
      summary: Login user
      tags:
      - Users
swagger: "2.0"
